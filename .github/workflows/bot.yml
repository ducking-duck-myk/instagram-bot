name: Instagram Auto Bot

on:
  schedule:
    - cron: '0 9  * * *'   # 9 AM UTC
    - cron: '0 14 * * *'   # 2 PM UTC
    - cron: '0 19 * * *'   # 7 PM UTC
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - follow
          - like
          - unfollow
          - stats

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📂 Create data directory
        run: mkdir -p data

      - name: 💾 Restore session & state
        uses: actions/cache@v3
        with:
          path: data/
          key: instagram-bot-data
          restore-keys: instagram-bot-data

      - name: 🤖 Run Bot (Scheduled)
        if: github.event_name == 'schedule'
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
        run: python main.py --full

      - name: 🤖 Run Bot (Manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
        run: python main.py --${{ github.event.inputs.action }}

      - name: 💾 Save session & state
        uses: actions/cache@v3
        if: always()
        with:
          path: data/
          key: instagram-bot-data

      - name: 📊 Upload logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: bot-logs-${{ github.run_number }}
          path: data/bot_log.txt
          retention-days: 7
